<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>English Learning AI</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
text-align:center;
padding:30px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
width:250px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:520px;
margin:20px auto;
text-align:left;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

textarea{
width:520px;
height:150px;
padding:10px;
}

.wordButton{
margin:3px;
padding:6px 8px;
}

.wordItem{
padding:5px;
border-bottom:1px solid #eee;
}

.section{
margin-top:40px;
}

</style>

</head>

<body>

<h1>📖 English Learning AI</h1>

<input id="wordInput" placeholder="輸入英文單字">

<button onclick="searchWord()">查詢</button>

<button onclick="speak()">🔊 發音</button>

<div id="result"></div>

<button onclick="review()">🧠 複習單字</button>

<button onclick="quiz()">🎯 測驗模式</button>

<div id="quizArea"></div>

<div class="section">

<h2>📚 文章 / 字幕分析</h2>

<textarea id="textInput" placeholder="貼上英文文章或字幕"></textarea>

<br>

<button onclick="analyze()">分析生字</button>

<div id="textResult"></div>

</div>

<div class="section">

<h2>⭐ 我的單字庫</h2>

<div id="vocabList"></div>

</div>

<script>

let vocab = JSON.parse(localStorage.getItem("vocab")) || []

renderList()

function renderList(){

let html=""

vocab.forEach(w=>{

html+=`<div class="wordItem">${w}</div>`

})

document.getElementById("vocabList").innerHTML=html

}

async function searchWord(){

let word=document.getElementById("wordInput").value

if(!word)return

let dict=await fetch(
`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
)

let dictData=await dict.json()

let meaning=dictData[0].meanings[0].definitions[0].definition

let example=dictData[0].meanings[0].definitions[0].example || "No example"

let trans=await fetch(
`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh`
)

let transData=await trans.json()

let zh=transData.responseData.translatedText

document.getElementById("result").innerHTML=`

<div class="card">

<h2>${word}</h2>

<p><b>中文:</b> ${zh}</p>

<p><b>English Meaning:</b> ${meaning}</p>

<p><b>Example:</b> ${example}</p>

<button onclick="saveWord('${word}')">⭐ 加入單字庫</button>

</div>

`

}

function saveWord(word){

if(!vocab.includes(word)){

vocab.push(word)

localStorage.setItem("vocab",JSON.stringify(vocab))

renderList()

}

}

function speak(){

let word=document.getElementById("wordInput").value

let speech=new SpeechSynthesisUtterance(word)

speech.lang="en-US"

speechSynthesis.speak(speech)

}

function review(){

if(vocab.length==0){

alert("單字庫是空的")

return

}

let word=vocab[Math.floor(Math.random()*vocab.length)]

document.getElementById("wordInput").value=word

searchWord()

}

function analyze(){

let text=document.getElementById("textInput").value

let words=text.match(/\b[a-zA-Z]+\b/g)

let unique=[...new Set(words)]

let html=""

unique.forEach(w=>{

html+=`<button class="wordButton" onclick="fill('${w}')">${w}</button>`

})

document.getElementById("textResult").innerHTML=html

}

function fill(word){

document.getElementById("wordInput").value=word

searchWord()

}

function quiz(){

if(vocab.length==0){

alert("單字庫沒有單字")

return

}

let word=vocab[Math.floor(Math.random()*vocab.length)]

document.getElementById("quizArea").innerHTML=`

<div class="card">

<h3>這個單字是什麼意思？</h3>

<h2>${word}</h2>

<button onclick="searchWordFromQuiz('${word}')">看答案</button>

</div>

`

}

function searchWordFromQuiz(word){

document.getElementById("wordInput").value=word

searchWord()

}

</script>

</body>
</html>
